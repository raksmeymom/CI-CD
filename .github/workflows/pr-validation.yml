name: PR Validation

on:
  pull_request:
    branches: [main, staging]
    types: [opened, synchronize, reopened]

jobs:
  # Validate PR title follows Conventional Commits
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  # Preview deployment for PRs
  deploy-preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment:
      name: preview-pr-${{ github.event.number }}
      url: https://pr-${{ github.event.number }}.preview.yoursaas.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy PR preview environment
        run: |
          helm upgrade --install saas-pr-${{ github.event.number }} ./helm/saas-app \
            --namespace previews \
            --create-namespace \
            --set image.tag=sha-${{ github.sha }} \
            --set ingress.host=pr-${{ github.event.number }}.preview.yoursaas.com \
            --set environment=preview \
            --set replicaCount=1 \
            --values ./helm/values/preview.yaml \
            --wait --timeout 5m

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 **Preview deployed**: https://pr-${{ github.event.number }}.preview.yoursaas.com`
            });

  # Cleanup preview on PR close
  cleanup-preview:
    name: Cleanup preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Delete preview namespace
        run: |
          helm uninstall saas-pr-${{ github.event.number }} --namespace previews || true
