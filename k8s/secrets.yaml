# ⚠️  Do NOT commit real secret values here.
# This is a template. The CI/CD pipeline fills in values from GitHub Secrets.
# Apply with: kubectl apply -f k8s/secrets.yaml -n <namespace>

apiVersion: v1
kind: Secret
metadata:
  name: saas-secrets
  namespace: production # repeat for staging / previews as needed
type: Opaque
stringData:
  database-url: "postgresql://user:password@your-rds-host:5432/saasdb"
  redis-url: "redis://your-redis-host:6379"
  jwt-secret: "replace-with-strong-random-secret"
