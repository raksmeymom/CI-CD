apiVersion: v1
kind: Service
metadata:
  name: { { .Release.Name } }
  namespace: { { .Release.Namespace } }
  labels:
    app: { { .Release.Name } }
spec:
  type: ClusterIP
  selector:
    app: { { .Release.Name } }
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
